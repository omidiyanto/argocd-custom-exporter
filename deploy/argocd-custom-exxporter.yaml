apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-custom-exporter
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-custom-exporter
    app.kubernetes.io/component: exporter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-custom-exporter
  labels:
    app.kubernetes.io/name: argocd-custom-exporter
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-custom-exporter
  labels:
    app.kubernetes.io/name: argocd-custom-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-custom-exporter
subjects:
  - kind: ServiceAccount
    name: argocd-custom-exporter
    namespace: argocd
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-custom-exporter
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-custom-exporter
    app.kubernetes.io/component: exporter
spec:
  type: NodePort
  ports:
    - name: metrics
      port: 9184
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: argocd-custom-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-custom-exporter
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-custom-exporter
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-custom-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-custom-exporter
        app.kubernetes.io/component: exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9184"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: argocd-custom-exporter
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: ghcr.io/omidiyanto/argocd-custom-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9184
              protocol: TCP
          env:
            - name: EXPORTER_PORT
              value: "9184"
            - name: EXPORTER_NAMESPACE
              value: "argocd"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
